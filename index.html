<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taglish Translate - Mabuhay!</title>
    <meta name="description" content="Translate between English, Tagalog, and Taglish natively with an AI-powered conversational dictionary.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Load Material Symbols for icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="dark-theme">
    <nav class="navbar">
        <div class="logo">
            <h1>Taglish Translate</h1>
            <span class="greeting">Mabuhay! 👋</span>
        </div>
        <div class="nav-links">
            <a href="https://github.com/rssllssn" target="_blank" class="github-link" aria-label="GitHub Profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
            <a href="/privacy-policy/">Privacy Policy</a>
            <a href="/terms-of-use/">Terms of Use</a>
        </div>
    </nav>

    <main class="translator-container">
        <!-- Vibe Selector (Only active when translating TO Taglish) -->
        <div id="vibe-container" class="vibe-selector hidden">
            <span class="vibe-label">Taglish Vibe:</span>
            <div class="vibe-options">
                <label class="vibe-radio">
                    <input type="radio" name="vibe" value="casual" checked>
                    <span class="vibe-btn">Casual</span>
                </label>
                <label class="vibe-radio">
                    <input type="radio" name="vibe" value="formal">
                    <span class="vibe-btn">Formal</span>
                </label>
            </div>
        </div>

        <div class="translator-panels">
            <!-- Left Panel (Source) -->
            <div class="panel source-panel">
                <div class="panel-header">
                    <div class="custom-select">
                        <select id="source-lang">
                            <option value="en">English</option>
                            <option value="tl">Tagalog</option>
                            <option value="taglish">Taglish</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">arrow_drop_down</span>
                    </div>
                </div>
                <div class="panel-body">
                    <textarea id="source-text" placeholder="Enter text" spellcheck="false"></textarea>
                    
                    <div class="panel-footer">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <button id="mic-btn" class="icon-btn" aria-label="Voice Input">
                                <span class="material-symbols-outlined">mic</span>
                            </button>
                        </div>
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <span class="char-count">0 / 5000</span>
                            <button id="translate-action-btn" class="translate-action-btn">Translate</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Swap Button -->
            <div class="swap-container">
                <button id="swap-btn" class="icon-btn swap-btn" aria-label="Swap Languages">
                    <span class="material-symbols-outlined">sync_alt</span>
                </button>
            </div>

            <!-- Right Panel (Target) -->
            <div class="panel target-panel">
                <div class="panel-header">
                    <div class="custom-select">
                        <select id="target-lang">
                            <option value="taglish">Taglish</option>
                            <option value="en">English</option>
                            <option value="tl">Tagalog</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">arrow_drop_down</span>
                    </div>
                </div>
                <div class="panel-body">
                    <!-- Read-only textarea for result -->
                    <textarea id="target-text" placeholder="Translation" readonly spellcheck="false"></textarea>
                    
                    <div class="panel-footer target-footer" style="gap: 8px;">
                        <button class="icon-btn" id="tts-btn" aria-label="Text to Speech">
                            <span class="material-symbols-outlined">volume_up</span>
                        </button>
                        <button class="icon-btn" id="copy-btn" aria-label="Copy Translation">
                            <span class="material-symbols-outlined">content_copy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading-indicator" class="loading hidden">
            Translating...
        </div>
        <div id="error-message" class="error hidden"></div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Russell Sioson. All rights reserved.</p>
    </footer>

    <a href="https://github.com/rssllssn" target="_blank" class="floating-github" aria-label="My GitHub Profile">
        <svg viewBox="0 0 24 24" fill="currentColor">

        </svg>
    </a>

    <script src="script.js"></script>
</body>
</html>
